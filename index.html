<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>untuk kamu ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0b0809;
    --black-soft:#15100f;
    --pink:#f4c9d6;
    --pink-deep:#e3a3ba;
    --pink-dust:#f7dde4;
    --white:#faf6f4;
    --ink:#fdf9f7;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Jost', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--black);
    color:var(--ink);
    font-family:var(--sans);
    overflow:hidden;
  }

  #scrollContainer{
    height:100vh;
    height:100dvh;
    width:100%;
    overflow-y:scroll;
    overflow-x:hidden;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  #scrollContainer::-webkit-scrollbar{display:none;}

  .section{
    position:relative;
    height:100vh;
    height:100dvh;
    width:100%;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    overflow:hidden;
    display:flex;
    align-items:center;
  }

  /* ---------- layer 1 : video ---------- */
  .bg-video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    filter:saturate(0.92) brightness(0.85);
    transform:scale(1.02);
    transition:opacity 1.1s ease;
  }

  /* ---------- layer 2 : dark overlay ---------- */
  .overlay{
    position:absolute;
    inset:0;
    z-index:2;
    background:
      linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,.32) 45%, rgba(0,0,0,.5) 100%);
    pointer-events:none;
  }
  .overlay::after{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at 20% 50%, rgba(244,201,214,.08), transparent 60%);
  }

  /* ---------- content wrap ---------- */
  .content{
    position:relative;
    z-index:5;
    display:flex;
    align-items:center;
    gap:clamp(18px,4vw,56px);
    width:100%;
    padding:0 clamp(20px,6vw,80px);
    opacity:0;
    transform:translateY(18px);
    transition:opacity 1.1s ease, transform 1.1s ease;
  }
  .section.is-active .content{
    opacity:1;
    transform:translateY(0);
  }

  /* ---------- layer 3+4 : photo + frame/flowers ---------- */
  .frame-wrap{
    position:relative;
    flex:0 0 auto;
    width:clamp(150px,32vw,230px);
  }
  .frame{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    border-radius:10px;
    padding:7px;
    background:linear-gradient(155deg, var(--pink-dust), var(--pink), var(--pink-deep));
    box-shadow:
      0 18px 45px rgba(0,0,0,.45),
      0 2px 10px rgba(0,0,0,.3);
  }
  .frame .photo{
    width:100%;
    height:100%;
    border-radius:6px;
    object-fit:cover;
    display:block;
    background:#1a1414;
    animation:softZoom 12s ease-in-out infinite alternate;
  }
  @keyframes softZoom{
    from{transform:scale(1);}
    to{transform:scale(1.06);}
  }
  .bloom{
    position:absolute;
    width:22px;
    height:22px;
    z-index:6;
    opacity:.95;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
  }
  .bloom svg{width:100%;height:100%;display:block;}
  .bloom.tl{top:-10px;left:-10px;transform:rotate(-15deg);}
  .bloom.br{bottom:-10px;right:-10px;transform:rotate(160deg);}
  .bloom.tr{top:-8px;right:14px;width:14px;height:14px;transform:rotate(40deg);opacity:.85;}

  /* ---------- layer 5 : words ---------- */
  .words{
    flex:1 1 auto;
    max-width:560px;
  }
  .quote-index{
    font-family:var(--sans);
    font-size:12px;
    letter-spacing:.35em;
    text-transform:uppercase;
    color:var(--pink);
    opacity:.75;
    margin-bottom:14px;
    display:block;
  }
  .quote{
    font-family:var(--serif);
    font-style:italic;
    font-weight:500;
    font-size:clamp(22px,4.6vw,38px);
    line-height:1.4;
    color:var(--white);
    text-shadow:0 3px 18px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.6);
  }
  .quote .accent{
    color:var(--pink);
  }

  /* ---------- progress indicator ---------- */
  #progress{
    position:fixed;
    right:clamp(10px,3vw,26px);
    top:50%;
    transform:translateY(-50%);
    z-index:50;
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
  }
  #progress .dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:rgba(250,246,244,.35);
    transition:all .4s ease;
  }
  #progress .dot.active{
    background:var(--pink);
    height:20px;
    border-radius:4px;
    box-shadow:0 0 8px rgba(244,201,214,.6);
  }

  #counter{
    position:fixed;
    left:clamp(16px,4vw,32px);
    bottom:clamp(16px,4vh,32px);
    z-index:50;
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.3em;
    color:var(--pink-dust);
    opacity:.7;
  }

  /* ---------- intro overlay ---------- */
  #intro{
    position:fixed;
    inset:0;
    z-index:100;
    background:var(--black);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    text-align:center;
    transition:opacity .9s ease;
    padding:24px;
  }
  #intro h1{
    font-family:var(--serif);
    font-style:italic;
    font-weight:400;
    font-size:clamp(24px,6vw,42px);
    color:var(--white);
  }
  #intro p{
    font-family:var(--sans);
    font-size:12px;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--pink);
    opacity:.8;
  }
  #startBtn{
    margin-top:10px;
    padding:14px 38px;
    border-radius:999px;
    border:1px solid rgba(244,201,214,.5);
    background:transparent;
    color:var(--pink-dust);
    font-family:var(--sans);
    font-size:12px;
    letter-spacing:.2em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .35s ease;
  }
  #startBtn:hover{
    background:var(--pink);
    color:var(--black);
    border-color:var(--pink);
  }
  #intro.hide{opacity:0;pointer-events:none;}

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion:reduce){
    .frame .photo{animation:none;}
    .content{transition:none;}
  }

  /* ---------- mobile tuning ---------- */
  @media (max-width:640px){
    .content{
      flex-direction:column;
      align-items:flex-start;
      gap:22px;
      padding:0 22px;
    }
    .frame-wrap{width:clamp(140px,42vw,190px);}
    .words{max-width:100%;}
  }

  :focus-visible{outline:2px solid var(--pink);outline-offset:3px;}
</style>
</head>
<body>

<div id="intro">
  <p>sebuah surat digital</p>
  <h1>untuk kamu, dari aku 🌸</h1>
  <button id="startBtn">buka surat</button>
</div>

<div id="progress"></div>
<div id="counter">01 / 10</div>

<div id="scrollContainer"></div>

<audio id="bgSong" src="projectsongs.mp3" loop preload="auto"></audio>

<script>
const entries = [
  { video:"gift1.mp4",  photo:"f1.jpg",  text:"makasih ya, udah nemenin aku <span class='accent'>sejauh ini.</span>" },
  { video:"gift2.mp4",  photo:"f2.jpg",  text:"semoga nanti kita masih bisa ketawa di <span class='accent'>hal-hal kecil</span> yang sama." },
  { video:"gift3.mp4",  photo:"f3.jpg",  text:"kadang aku mikir, <span class='accent'>untung waktu itu</span> aku kenal kamu." },
  { video:"gift4.mp4",  photo:"f4.jpg",  text:"ga perlu jadi sempurna, cukup <span class='accent'>tetap jadi diri kamu.</span>" },
  { video:"gift5.mp4",  photo:"f5.jpg",  text:"semoga setiap hari kamu selalu nemuin <span class='accent'>alasan buat senyum.</span>" },
  { video:"gift6.mp4",  photo:"f6.jpg",  text:"kalau lagi capek, istirahat dulu. <span class='accent'>aku ga ke mana-mana.</span>" },
  { video:"gift7.mp4",  photo:"f7.jpg",  text:"semoga apa pun yang kita jalanin sekarang, bisa jadi <span class='accent'>kenangan yang bikin kita senyum</span> nanti." },
  { video:"gift8.mp4",  photo:"f8.jpg",  text:"aku ga jago ngomong manis, tapi aku <span class='accent'>selalu serius</span> kalau soal kamu." },
  { video:"gift9.mp4",  photo:"f9.jpg",  text:"semoga kita selalu punya waktu buat <span class='accent'>saling dengerin,</span> walaupun cuma sebentar." },
  { video:"gift10.mp4", photo:"f10.jpg", text:"aku cuma pengen bilang, <span class='accent'>makasih</span> udah jadi bagian dari hidup aku. ♡" },
];

const bloomSVG = `<svg viewBox="0 0 24 24" fill="none">
  <g fill="#f6c9d8">
    <ellipse cx="12" cy="6" rx="4" ry="5"/>
    <ellipse cx="12" cy="18" rx="4" ry="5"/>
    <ellipse cx="6" cy="12" rx="5" ry="4"/>
    <ellipse cx="18" cy="12" rx="5" ry="4"/>
  </g>
  <circle cx="12" cy="12" r="3.4" fill="#e79cb8"/>
</svg>`;

const container = document.getElementById('scrollContainer');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('counter');

entries.forEach((e, i) => {
  const section = document.createElement('section');
  section.className = 'section';
  section.dataset.index = i;

  section.innerHTML = `
    <video class="bg-video" muted loop playsinline preload="none" data-src="${e.video}"></video>
    <div class="overlay"></div>
    <div class="content">
      <div class="frame-wrap">
        <div class="bloom tl">${bloomSVG}</div>
        <div class="bloom br">${bloomSVG}</div>
        <div class="bloom tr">${bloomSVG}</div>
        <div class="frame">
          <img class="photo" src="${e.photo}" loading="lazy" alt="kenangan ${i+1}">
        </div>
      </div>
      <div class="words">
        <span class="quote-index">${String(i+1).padStart(2,'0')} — untuk kamu</span>
        <p class="quote">${e.text}</p>
      </div>
    </div>
  `;
  container.appendChild(section);

  const dot = document.createElement('div');
  dot.className = 'dot';
  progressEl.appendChild(dot);
});

const sections = Array.from(document.querySelectorAll('.section'));
const dots = Array.from(document.querySelectorAll('#progress .dot'));
const videos = Array.from(document.querySelectorAll('.bg-video'));

function loadVideo(v){
  if(!v || v.src) return;
  v.src = v.dataset.src;
}

const io = new IntersectionObserver((obsEntries) => {
  obsEntries.forEach(entry => {
    const section = entry.target;
    const idx = Number(section.dataset.index);
    const video = section.querySelector('.bg-video');

    if(entry.isIntersecting && entry.intersectionRatio > 0.55){
      section.classList.add('is-active');
      loadVideo(video);
      video.play().catch(()=>{});

      // preload next video only
      const next = videos[idx+1];
      if(next) loadVideo(next);

      dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
      counterEl.textContent = String(idx+1).padStart(2,'0') + ' / 10';
    } else {
      section.classList.remove('is-active');
      if(video && video.src) video.pause();
    }
  });
}, { threshold: [0, 0.55, 1] });

sections.forEach(s => io.observe(s));

// intro / first interaction -> start audio + first video
const introEl = document.getElementById('intro');
const startBtn = document.getElementById('startBtn');
const song = document.getElementById('bgSong');

startBtn.addEventListener('click', () => {
  introEl.classList.add('hide');
  loadVideo(videos[0]);
  videos[0].play().catch(()=>{});
  song.currentTime = 0;
  song.play().catch(()=>{});
  document.body.style.overflow = 'auto';
  setTimeout(()=>{ introEl.style.display='none'; }, 900);
});
</script>
</body>
</html>
